<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact | Picao Caldense</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <nav class="nav">

    <div class="nav-left">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="order.html" data-i18n="nav_order">Order</a>
      <a href="contact-us.html" data-i18n="nav_contact">Contact</a>
    </div>

    <div class="lang-switch">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('fr')">FR</button>
      <button onclick="setLanguage('es')">ES</button>
    </div>

  </nav>
</header>
  <title>Picao Caldense - Chat & Order</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #111;
      color: white;
      flex-wrap: wrap;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .lang-switch button {
      margin-left: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }

    /* MAIN */
    main {
      padding: 20px;
    }

    /* CHAT */
    #chatbox {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 20px;
      background: #fff;
      border-radius: 8px;
    }

    .chat-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .chat-row input {
      flex: 1;
      padding: 10px;
    }

    .chat-row button {
      padding: 10px 15px;
      cursor: pointer;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #f5f5f5;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <div><strong>Picao Caldense</strong></div>

  <div>
    <a href="#">Home</a>
    <a href="#">Order</a>
    <a href="#">Contact</a>
  </div>

  <div class="lang-switch">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('es')">ES</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main>

  <h1 data-i18n="title">Chatbot Assistant</h1>

  <div id="chatbox"></div>

  <div class="chat-row">
    <input id="input" placeholder="Type message..." />
    <button id="sendBtn" data-i18n="send">Send</button>
  </div>

</main>

<!-- FOOTER -->
<footer>
  <p data-i18n="footer">© 2025 Picao Caldense</p>
</footer>

<script>
/* ---------------- LANGUAGE SYSTEM ---------------- */

const translations = {
  en: {
    title: "Chatbot Assistant",
    send: "Send",
    footer: "© 2025 Picao Caldense"
  },
  fr: {
    title: "Assistant Chatbot",
    send: "Envoyer",
    footer: "© 2025 Picao Caldense"
  },
  es: {
    title: "Asistente Chatbot",
    send: "Enviar",
    footer: "© 2025 Picao Caldense"
  }
};

function setLang(lang) {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    el.textContent = translations[lang][key];
  });
}

/* ---------------- CHAT SYSTEM ---------------- */

const chat = document.getElementById("chatbox");
const input = document.getElementById("input");
const btn = document.getElementById("sendBtn");

function addMessage(sender, text) {
  const p = document.createElement("p");

  const bold = document.createElement("b");
  bold.textContent = sender + ": ";

  p.appendChild(bold);
  p.appendChild(document.createTextNode(text));

  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  addMessage("You", message);
  input.value = "";

  const bot = document.createElement("p");
  bot.innerHTML = "<b>Bot:</b> typing...";
  chat.appendChild(bot);

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    bot.innerHTML = "<b>Bot:</b> ";
    bot.appendChild(document.createTextNode(data.reply || "No response"));

  } catch (err) {
    console.error(err);
    bot.innerHTML = "<b>Bot:</b> connection error";
  }

  btn.disabled = false;
}

btn.addEventListener("click", send);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
