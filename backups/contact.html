<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact | Picao Caldense</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVIGATION (FIXED + CONSISTENT THEME) -->
<header class="site-header">
  <nav class="nav">

    <div class="nav-left">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="order.html" data-i18n="nav_order">Order</a>
      <a href="contact-us.html" data-i18n="nav_contact">Contact</a>
    </div>

    <div class="lang-switch">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('fr')">FR</button>
      <button onclick="setLanguage('es')">ES</button>
    </div>

  </nav>
</header>

<!-- MAIN CONTENT -->
<main class="container">

  <h1 data-i18n="title">Picao Assistant</h1>

  <div id="chatbox"></div>

  <div class="chat-row">
    <input id="input" placeholder="Type message..." />
    <button id="sendBtn" data-i18n="send">Send</button>
  </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p data-i18n="footer">© 2025 Picao Caldense</p>
</footer>

<!-- LANGUAGE SYSTEM (FIXED CONSISTENCY) -->
<script>
const translations = {
  en: {
    nav_home: "Home",
    nav_about: "About",
    nav_order: "Order",
    nav_contact: "Contact",
    title: "Picao Assistant",
    send: "Send",
    footer: "© 2025 Picao Caldense"
  },
  fr: {
    nav_home: "Accueil",
    nav_about: "À propos",
    nav_order: "Commander",
    nav_contact: "Contact",
    title: "Assistant Picao",
    send: "Envoyer",
    footer: "© 2025 Picao Caldense"
  },
  es: {
    nav_home: "Inicio",
    nav_about: "Acerca de",
    nav_order: "Ordenar",
    nav_contact: "Contacto",
    title: "Asistente Picao",
    send: "Enviar",
    footer: "© 2025 Picao Caldense"
  }
};

function setLanguage(lang) {
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (translations[lang][key]) {
      el.textContent = translations[lang][key];
    }
  });

  localStorage.setItem("lang", lang);
}

document.addEventListener("DOMContentLoaded", () => {
  setLanguage(localStorage.getItem("lang") || "en");
});
</script>

<!-- CHAT SYSTEM -->
<script>
const chat = document.getElementById("chatbox");
const input = document.getElementById("input");
const btn = document.getElementById("sendBtn");

function addMessage(sender, text) {
  const p = document.createElement("p");

  const bold = document.createElement("b");
  bold.textContent = sender + ": ";

  p.appendChild(bold);
  p.appendChild(document.createTextNode(text));

  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  addMessage("You", message);
  input.value = "";

  const bot = document.createElement("p");
  bot.innerHTML = "<b>Bot:</b> typing...";
  chat.appendChild(bot);

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    bot.innerHTML = "<b>Bot:</b> " + (data.reply || "No response");

  } catch (err) {
    bot.innerHTML = "<b>Bot:</b> connection error";
  }

  btn.disabled = false;
}

btn.addEventListener("click", send);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
