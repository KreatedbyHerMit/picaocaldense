<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="assets/css/styles.css">
  <title>Contact</title>
</head>

<body>

<header>
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="order.html">Order</a>
  <a href="contact-us.html">Contact</a>
</nav>
</header>

<div class="container">

<h1>Chatbot Assistant</h1>

<div class="chatbox" id="chatbox"></div>

<input id="input" placeholder="Type...">
<button id="sendBtn" onclick="send()">Send</button>

</div>

<script>
async function send() {
  const inputEl = document.getElementById("input");
  const chat = document.getElementById("chatbox");
  const btn = document.getElementById("sendBtn");

  const message = inputEl.value.trim();
  if (!message) return;

  // -------------------------
  // SAFE user message rendering
  // -------------------------
  const userMsg = document.createElement("p");
  const userBold = document.createElement("b");
  userBold.textContent = "You: ";

  const userText = document.createElement("span");
  userText.textContent = message;

  userMsg.appendChild(userBold);
  userMsg.appendChild(userText);
  chat.appendChild(userMsg);

  inputEl.value = "";

  // Loading state
  const loadingMsg = document.createElement("p");
  const botBold = document.createElement("b");
  botBold.textContent = "Bot: ";

  const botText = document.createElement("span");
  botText.textContent = "typing...";

  loadingMsg.appendChild(botBold);
  loadingMsg.appendChild(botText);
  chat.appendChild(loadingMsg);

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    // Replace bot response safely
    botText.textContent = data.reply || "No response";

  } catch (err) {
    botText.textContent = "Sorry, connection error.";
  }

  btn.disabled = false;

  // Auto scroll
  chat.scrollTop = chat.scrollHeight;
}

// Enter key support
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
