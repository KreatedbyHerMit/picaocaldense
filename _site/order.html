<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="assets/css/styles.css">
  <title>Order | Picao Caldense</title>
</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="order.html">Order</a>
    <a href="contact-us.html">Contact</a>
  </nav>
</header>

<div class="container">

  <h1>Place Your Order</h1>

  <form id="orderForm">

    <input type="text" name="name" placeholder="Full Name" required>

    <select name="product" required>
      <option value="">Select Product</option>
      <option value="Classic Pique">Classic Piqué Salsa</option>
      <option value="Jalapeno Special">Jalapeño Special</option>
      <option value="Spicy Thai Delight">Spicy Thai Delight</option>
    </select>

    <input type="number" name="quantity" placeholder="Quantity (e.g. 1, 6, 12)" required min="1">

    <textarea name="message" placeholder="Special instructions (optional)"></textarea>

    <button type="submit">Send Order</button>

  </form>

</div>

<script>
document.getElementById("orderForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  const data = {
    name: formData.get("name"),
    product: formData.get("product"),
    quantity: formData.get("quantity"),
    message: formData.get("message")
  };

  const res = await fetch("/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  alert(result.reply || "Order sent successfully!");
});
</script>

</body>
</html>
