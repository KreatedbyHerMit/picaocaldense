<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title data-i18n="contact_title">Contact | Picao Caldense</title>

<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVIGATION (MATCHED SITEWIDE STRUCTURE) -->
<header class="site-header">
  <nav class="nav">

    <div class="nav-left">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="order.html" data-i18n="nav_order">Order</a>
      <a href="contact.html" data-i18n="nav_contact">Contact</a>
    </div>

    <div class="lang-switch">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('fr')">FR</button>
      <button onclick="setLanguage('es')">ES</button>
    </div>

  </nav>
</header>

<!-- HERO (MATCHES HOME / ABOUT STYLE) -->
<section class="hero">
  <h1 class="hero-title" data-i18n="contact_title">Contact Us</h1>
  <p class="hero-subtitle" data-i18n="contact_subtitle">
    Every message becomes part of our Colombian story.
  </p>
</section>

<!-- MAIN CONTENT (LUXURY CARD STRUCTURE) -->
<main class="content-section">

  <div class="two-column">

    <!-- INFO CARD -->
    <div class="card">
      <h2 data-i18n="contact_info_title">Get in Touch</h2>

      <p><strong>Email:</strong> hello@picaocaldense.com</p>
      <p><strong>Location:</strong> Montreal, QC</p>

      <p class="story-text" data-i18n="contact_story">
        Rooted in Colombian tradition, every conversation carries flavor, memory, and heritage.
      </p>
    </div>

    <!-- CHAT CARD -->
    <div class="card">
      <h2 data-i18n="chat_title">Picao Assistant</h2>

      <div id="chatbox" class="chatbox"></div>

      <div class="chat-row">
        <input id="input" placeholder="Type message..." />
        <button id="sendBtn" data-i18n="send">Send</button>
      </div>
    </div>

  </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p data-i18n="footer">© 2025 Picao Caldense</p>
</footer>

<!-- LANGUAGE SYSTEM (KEEP YOUR VERSION BUT CLEANED) -->
<script>
const translations = {
  en: {
    nav_home: "Home",
    nav_about: "About",
    nav_order: "Order",
    nav_contact: "Contact",
    contact_title: "Contact Us",
    contact_subtitle: "Every message becomes part of our Colombian story.",
    contact_info_title: "Get in Touch",
    contact_story: "Rooted in Colombian tradition, every conversation carries flavor, memory, and heritage.",
    chat_title: "Picao Assistant",
    send: "Send",
    footer: "© 2025 Picao Caldense"
  },
  fr: {
    nav_home: "Accueil",
    nav_about: "À propos",
    nav_order: "Commander",
    nav_contact: "Contact",
    contact_title: "Contact",
    contact_subtitle: "Chaque message fait partie de notre histoire colombienne.",
    contact_info_title: "Contactez-nous",
    contact_story: "Ancré dans la tradition colombienne...",
    chat_title: "Assistant Picao",
    send: "Envoyer",
    footer: "© 2025 Picao Caldense"
  },
  es: {
    nav_home: "Inicio",
    nav_about: "Acerca de",
    nav_order: "Ordenar",
    nav_contact: "Contacto",
    contact_title: "Contacto",
    contact_subtitle: "Cada mensaje forma parte de nuestra historia colombiana.",
    contact_info_title: "Contáctanos",
    contact_story: "Arraigado en la tradición colombiana...",
    chat_title: "Asistente Picao",
    send: "Enviar",
    footer: "© 2025 Picao Caldense"
  }
};

function setLanguage(lang) {
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (translations[lang][key]) {
      el.textContent = translations[lang][key];
    }
  });

  localStorage.setItem("lang", lang);
}

document.addEventListener("DOMContentLoaded", () => {
  setLanguage(localStorage.getItem("lang") || "en");
});
</script>

<!-- CHAT SYSTEM (UNCHANGED LOGIC) -->
<script>
const chat = document.getElementById("chatbox");
const input = document.getElementById("input");
const btn = document.getElementById("sendBtn");

function addMessage(sender, text) {
  const p = document.createElement("p");
  p.innerHTML = `<b>${sender}:</b> ${text}`;
  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  addMessage("You", message);
  input.value = "";

  const bot = document.createElement("p");
  bot.innerHTML = "<b>Bot:</b> typing...";
  chat.appendChild(bot);

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    bot.innerHTML = "<b>Bot:</b> " + (data.reply || "No response");

  } catch (err) {
    bot.innerHTML = "<b>Bot:</b> connection error";
  }

  btn.disabled = false;
}

btn.addEventListener("click", send);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
