<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picao Caldense Chatbot</title>

<style>
body{
    font-family:Arial, sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

h2{
    text-align:center;
}

#chatbox{
    height:350px;
    overflow-y:auto;
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
    margin-bottom:10px;
}

#msg{
    width:75%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>Picao Caldense Multilingual Chatbot</h2>

<div id="chatbox"></div>

<input
    id="msg"
    type="text"
    placeholder="Type a message..."
    onkeydown="if(event.key==='Enter') send();">

<button onclick="send()">Send</button>

<script>
function send(){

    const input = document.getElementById("msg");
    const box = document.getElementById("chatbox");

    const text = input.value.trim();

    if(!text) return;

    box.innerHTML += `<div><b>You:</b> ${text}</div>`;

    const t = text.toLowerCase();

    let reply = "";

    /* FRENCH */

    if(t.includes("bonjour") || t.includes("salut")){
        reply = "Bonjour 👋 Comment puis-je vous aider aujourd'hui ?";
    }

    else if(t.includes("commande") || t.includes("acheter")){
        reply = "Vous pouvez passer votre commande dans la section Commande.";
    }

    else if(t.includes("livraison") || t.includes("livrer")){
        reply = "Les commandes sont expédiées en quelques jours et peuvent être suivies par courriel.";
    }

    else if(t.includes("annuler")){
        reply = "Demande d'annulation reçue. Veuillez envoyer votre numéro de commande par courriel.";
    }

    else if(t.includes("remboursement") || t.includes("retour")){
        reply = "Veuillez nous contacter par courriel avec votre numéro de commande.";
    }

    else if(t.includes("prix")){
        reply = "Veuillez nous contacter pour connaître les prix actuels.";
    }

    else if(t.includes("saveur")){
        reply = "Nous offrons actuellement Signature Blend, Classic Piqué, Jalapeño Special et Spicy Thai.";
    }

    else if(t.includes("ingredient") || t.includes("ingrédient")){
        reply = "Nos sauces sont préparées avec des ingrédients naturels de qualité.";
    }

    /* SPANISH */

    else if(t.includes("hola")){
        reply = "Hola 👋 ¿Cómo puedo ayudarte hoy?";
    }

    else if(t.includes("pedido") || t.includes("comprar")){
        reply = "Puedes realizar pedidos en la sección de pedidos.";
    }

    else if(t.includes("envio") || t.includes("envío")){
        reply = "Los pedidos se envían en pocos días y pueden rastrearse por correo electrónico.";
    }

    else if(t.includes("cancelar")){
        reply = "Solicitud de cancelación recibida. Envía tu número de pedido por correo electrónico.";
    }

    else if(
        t.includes("reembolso") ||
        t.includes("devolucion") ||
        t.includes("devolución")
    ){
        reply = "Contáctanos por correo electrónico con tu número de pedido.";
    }

    else if(t.includes("precio")){
        reply = "Contáctanos para obtener la información de precios actual.";
    }

    else if(t.includes("sabor")){
        reply = "Actualmente ofrecemos Signature Blend, Classic Piqué, Jalapeño Special y Spicy Thai.";
    }

    else if(t.includes("ingrediente")){
        reply = "Nuestras salsas están elaboradas con ingredientes naturales de calidad.";
    }

    /* ENGLISH */

    else if(t.includes("hello") || t.includes("hi")){
        reply = "Hello 👋 How can I help you today?";
    }

    else if(t.includes("order") || t.includes("buy")){
        reply = "You can place orders in the Order section.";
    }

    else if(t.includes("shipping") || t.includes("track")){
        reply = "Orders ship in a few days and can be tracked via email.";
    }

    else if(t.includes("cancel")){
        reply = "Cancellation request received. Please send your order number via email.";
    }

    else if(t.includes("refund") || t.includes("return")){
        reply = "Contact us via email with your order number for support.";
    }

    else if(t.includes("price") || t.includes("cost")){
        reply = "Please contact us for current pricing information.";
    }

    else if(t.includes("flavour") || t.includes("flavor")){
        reply = "We currently offer Signature Blend, Classic Piqué, Jalapeño Special and Spicy Thai.";
    }

    else if(t.includes("ingredient")){
        reply = "Our sauces are made with quality natural ingredients.";
    }

    /* DEFAULT */

    else{
        reply = "Thank you for contacting Picao Caldense. Please email us if you require additional assistance.";
    }

    setTimeout(() => {
        box.innerHTML += `<div><b>Picao Bot:</b> ${reply}</div>`;
        box.scrollTop = box.scrollHeight;
    }, 300);

    input.value = "";
}
</script>

</body>
</html>
