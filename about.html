<script>
const translations = {
  en: {
    orderTitle: "Order Page",
    product: "Product",
    flavours: "Flavours",
    how: "How to Order",
  },
  fr: {
    orderTitle: "Page de commande",
    product: "Produit",
    flavours: "Saveurs",
    how: "Comment commander",
  }
};

let lang = "en";

function toggleLang() {
  lang = lang === "en" ? "fr" : "en";
  applyLang();
}

function applyLang() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    el.innerText = translations[lang][key] || el.innerText;
  });
}

window.onload = applyLang;
</script>

</body>
