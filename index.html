<!DOCTYPE html>
<html>
<head>
  <title>Picao Caldense</title>
</head>
<body>
  <h1>Welcome to Picao Caldense!</h1>
<!-- PICAO CHATBOX -->
<div id="picao-chat">
  <div id="picao-header">🌶️ Picao Assistant</div>
  <div id="picao-messages"></div>
  <input id="picao-input" placeholder="Ask about orders..." />
  <button onclick="sendMsg()">Send</button>
</div>

</html>

<style>
#picao-chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 300px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-family: Arial;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  z-index: 9999;
}

#picao-header {
  background: #b22222;
  color: white;
  padding: 10px;
  font-weight: bold;
}

#picao-messages {
  height: 200px;
  overflow-y: auto;
  padding: 10px;
  font-size: 14px;
}

#picao-input {
  width: 70%;
  padding: 8px;
  border: 1px solid #ccc;
}

button {
  width: 28%;
  background: #b22222;
  color: white;
  border: none;
  padding: 8px;
}
</style>


<script>
function sendMsg() {
  const input = document.getElementById("picao-input");
  const msg = input.value.trim();
  const box = document.getElementById("picao-messages");

  if (!msg) return;

  box.innerHTML += "<div><b>You:</b> " + msg + "</div>";

  let reply = getReply(msg.toLowerCase());

  box.innerHTML += "<div><b>Picao Assistant:</b> " + reply + "</div>";

  input.value = "";
  box.scrollTop = box.scrollHeight;
}

function getReply(msg) {

  if (msg.includes("price")) {
    return "We offer 355ml bottles in half-dozen and dozen packs.";
  }

  if (msg.includes("flavor")) {
    return "Flavors: Classic Pique, Jalapeño Special, Spicy Thai Delight 🌶️";
  }

  if (msg.includes("ship")) {
    return "We currently ship within Quebec and Ontario.";
  }

  if (msg.includes("order")) {
    return "Please provide your email and quantity, and we will contact you.";
  }

  return "Thanks! The Picao team will follow up with you shortly.";
}
</script>
