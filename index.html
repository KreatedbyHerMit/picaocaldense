<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Picao Caldense</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<h1>Picao Caldense</h1>
<p>Luxury Colombian sauce brand</p>

<div id="chatbox" style="height:300px;overflow:auto;border:1px solid #ccc;padding:10px;margin-bottom:10px;"></div>

<input id="input" placeholder="Type message..." />
<button onclick="send()">Send</button>

<script>
function escapeHTML(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function appendMessage(sender, text) {
  const chat = document.getElementById("chatbox");

  const p = document.createElement("p");
  p.innerHTML = "<b>" + sender + ":</b> " + escapeHTML(text);

  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const inputEl = document.getElementById("input");
  const button = document.querySelector("button");
  const message = inputEl.value.trim();

  if (!message) return;

  appendMessage("You", message);
  inputEl.value = "";

  button.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    appendMessage("Bot", data.reply || "No response");

  } catch (err) {
    appendMessage("Bot", "Connection error");
  }

  button.disabled = false;
}
</script>

</body>
</html>
