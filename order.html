<title>Picao Caldense</title>

<style>
:root{
  --bg:#f7f1e8;
  --text:#1a1a1a;
  --green:#1f3b2c;
  --heat:#c2412d;
  --gold:#b08a57;
}

body{
  margin:0;
  font-family: "Georgia", serif;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  border-bottom:1px solid rgba(176,138,87,0.25);
}

nav a{
  margin-right:16px;
  cursor:pointer;
  font-family: Arial, sans-serif;
  font-size:14px;
}

nav a:hover{ color:var(--green); }

.lang button{
  margin-left:6px;
  background:transparent;
  border:1px solid var(--gold);
  padding:6px 10px;
  cursor:pointer;
}

.hero{
  text-align:center;
  padding:90px 20px 60px;
}

.hero h1{ font-size:44px; margin:0; }

.hero p{
  max-width:600px;
  margin:15px auto 0;
  font-family: Arial, sans-serif;
  color:#444;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:rgba(255,255,255,0.4);
  border:1px solid rgba(176,138,87,0.3);
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
}

button.primary{
  background:var(--heat);
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

section{ display:none; }
section.active{ display:block; }

#chatbox{
  height:180px;
  overflow:auto;
  border:1px solid rgba(176,138,87,0.3);
  padding:10px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.3);
}

input{
  padding:10px;
  width:70%;
  border:1px solid rgba(176,138,87,0.4);
  border-radius:8px;
}

footer{
  text-align:center;
  padding:30px 20px;
  border-top:1px solid rgba(176,138,87,0.25);
  margin-top:40px;
  font-family: Arial, sans-serif;
  font-size:13px;
  color:#444;
}
</style>
</head>

    <button onclick="setLang('es')">ES</button>

</section>

<!-- ABOUT -->
<section id="about">

    <div class="container">

        <p data-i18n="about_text_a"></p>
        <p data-i18n="about_text_b"></p>
        <p data-i18n="about_text_c"></p>
        <p data-i18n="about_text_d"></p>
      </div>
    </div>
  </div>
</section>

<!-- ORDER -->
<section id="order">
  <div class="hero">
    <h1 data-i18n="order_heading"></h1>
    <p data-i18n="order_intro"></p>
  </div>

  <div class="container">

</section>

<section id="contact">

  <div class="container">
    <div class="card">
      <div id="chatbox"></div>
      <input id="msg" placeholder="Type message...">
      <button class="primary" onclick="send()">Send</button>
    </div>
  </div>
</section>

<footer>
  <p data-i18n="instagram"></p>
  <p data-i18n="footer"></p>
</footer>

    about_title:"À propos",
    about_text_a:"Sauce colombienne artisanale.",
    about_text_b:"Picao Caldense puise son inspiration dans la région de Caldas en Colombie, une région reconnue pour ses riches traditions culinaires, sa culture montagnarde, son hospitalité chaleureuse et ses saveurs intenses et réconfortantes. Le nom « Caldense » fait référence aux habitants et à la culture de Caldas, reliant la marque à l’héritage colombien et aux traditions de partage de la nourriture en famille et en communauté.",

function setLang(lang){
  const d = translations[lang];
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    if(d[key]) el.textContent = d[key];
  });
  localStorage.setItem("lang", lang);
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function orderEmail(){
  window.location.href="mailto:jessica.betancur@picaocaldense.com?subject=Picao Caldense Order";
}

/* FULL CHATBOT FIXED */
function send(){
  const input=document.getElementById("msg");
  const box=document.getElementById("chatbox");
  const text=input.value.trim();
  if(!text) return;

  box.innerHTML+=`<div><b>You:</b> ${text}</div>`;
  const t=text.toLowerCase();

  let reply="";

  if(t.includes("hello")||t.includes("hi")){
    reply="Hello 👋 How can I help you today?";
  }
  else if(t.includes("order")||t.includes("buy")){
    reply="You can place orders in the Order section.";
  }
  else if(t.includes("shipping")||t.includes("track")){
    reply="Orders ship in a few days and can be tracked via email.";
  }
  else if(t.includes("cancel")){
    reply="Cancellation request received. Please send order number via email.";
  }
  else if(t.includes("refund")||t.includes("return")){
    reply="Contact us via email with your order number for support via email.";
  }
  else if(t.includes("organic")||t.includes("natural")){
    reply="Made with natural, organic-inspired ingredients.";
  }
  else{
    reply="Thanks for your message. Please email us for support.";
  }

  setTimeout(()=>{
    box.innerHTML+=`<div><b>Picao Bot:</b> ${reply}</div>`;
    box.scrollTop=box.scrollHeight;
  },300);

  input.value="";
}

setLang(localStorage.getItem("lang")||"en");
