<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picao Caldense</title>

<style>
body{
  margin:0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background:#fff;
  color:#111;
}

.site-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  background:#fff;
}

.site-header a{
  margin-right:15px;
  cursor:pointer;
  color:#111;
  text-decoration:none;
  font-size:14px;
}

.hero{
  padding:90px 20px;
  text-align:center;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  max-width:600px;
  margin:auto;
  color:#555;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.card{
  border:1px solid #eee;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  background:#111;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  cursor:pointer;
}

section{ display:none; }
section.active{ display:block; }

.lang button{
  background:#fff;
  color:#111;
  border:1px solid #ddd;
  margin-left:5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <nav>
    <a onclick="show('home')" data-i18n="nav_home">Home</a>
    <a onclick="show('about')" data-i18n="nav_about">About</a>
    <a onclick="show('order')" data-i18n="nav_order">Order</a>
    <a onclick="show('contact')" data-i18n="nav_contact">Contact</a>
  </nav>

  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('es')">ES</button>
  </div>
</header>

<!-- HOME -->
<section id="home" class="active">
  <div class="hero">
    <h1 data-i18n="title"></h1>
    <p data-i18n="story"></p>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="hero">
    <h1 data-i18n="about_title"></h1>
  </div>
  <div class="container">
    <div class="card">
      <p data-i18n="about_text"></p>
    </div>
  </div>
</section>

<!-- ORDER -->
<section id="order">
  <div class="hero">
    <h1 data-i18n="order_heading"></h1>
    <p data-i18n="order_intro"></p>
  </div>

  <div class="container">
    <div class="card">
      <p data-i18n="order_signature_text"></p>
      <p data-i18n="flavour_classic"></p>
      <p data-i18n="flavour_jalapeno"></p>
      <p data-i18n="flavour_thai"></p>

      <button onclick="orderEmail()" data-i18n="place_order"></button>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="hero">
    <h1 data-i18n="contact_title"></h1>
  </div>

  <div class="container">
    <div class="card">
      <div id="chatbox" style="height:200px;overflow:auto;margin-bottom:10px;"></div>
      <input id="msg" placeholder="Type..." style="padding:10px;width:70%;">
      <button onclick="send()">Send</button>
    </div>
  </div>
</section>

<script>

const translations = {
  en:{
    nav_home:"Home", nav_about:"About", nav_order:"Order", nav_contact:"Contact",
    title:"Picao Caldense",
    story:"Born from Colombian kitchens where flavor is memory.",
    about_title:"About Us",
    about_text:"A heritage-driven Colombian sauce brand.",
    order_heading:"Order",
    order_intro:"Premium handcrafted sauces.",
    order_signature_text:"Signature Blend",
    flavour_classic:"Classic Salsa",
    flavour_jalapeno:"Jalapeño Heat",
    flavour_thai:"Thai Fusion",
    place_order:"Place Order",
    contact_title:"Contact"
  },

  fr:{
    nav_home:"Accueil", nav_about:"À propos", nav_order:"Commander", nav_contact:"Contact",
    title:"Picao Caldense",
    story:"Cuisine colombienne authentique.",
    about_title:"À propos",
    about_text:"Marque artisanale colombienne.",
    order_heading:"Commande",
    order_intro:"Sauces premium.",
    order_signature_text:"Mélange signature",
    flavour_classic:"Classique",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Thaï",
    place_order:"Commander",
    contact_title:"Contact"
  },

  es:{
    nav_home:"Inicio", nav_about:"Acerca de", nav_order:"Ordenar", nav_contact:"Contacto",
    title:"Picao Caldense",
    story:"Sabor colombiano auténtico.",
    about_title:"Acerca de",
    about_text:"Marca artesanal colombiana.",
    order_heading:"Pedido",
    order_intro:"Salsas premium.",
    order_signature_text:"Mezcla exclusiva",
    flavour_classic:"Clásica",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Tailandesa",
    place_order:"Ordenar",
    contact_title:"Contacto"
  }
};

function setLang(l){
  const d = translations[l];
  document.documentElement.lang = l;

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = d[el.dataset.i18n] || el.textContent;
  });

  localStorage.setItem("lang", l);
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function orderEmail(){
  window.location.href = "mailto:orders@picaocaldense.com?subject=Order Request";
}

function send(){
  const m = document.getElementById("msg");
  const box = document.getElementById("chatbox");

  if(!m.value.trim()) return;

  box.innerHTML += "<div><b>You:</b> " + m.value + "</div>";
  m.value = "";
}

setLang(localStorage.getItem("lang") || "en");

</script>

</body>
</html>
