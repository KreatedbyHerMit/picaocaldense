<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title data-i18n="order_title">Order | Picao Caldense</title>

<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVIGATION (CONSISTENT ACROSS SITE) -->
<header class="site-header">
  <nav class="nav">

    <div class="nav-left">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="order.html" data-i18n="nav_order">Order</a>
      <a href="contact.html" data-i18n="nav_contact">Contact</a>
    </div>

    <div class="lang-switch">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('fr')">FR</button>
      <button onclick="setLanguage('es')">ES</button>
    </div>

  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title" data-i18n="order_title">Order</h1>
  <p class="hero-subtitle" data-i18n="order_subtitle">
    Crafted flavors delivered with Colombian heritage.
  </p>
</section>

<!-- ORDER SECTION -->
<main class="content-section">

  <div class="two-column">

    <!-- PRODUCT INFO -->
    <div class="card">
      <h2 data-i18n="order_info_title">Our Selection</h2>
      <p data-i18n="order_info_text">
        Choose from our signature blends inspired by generations of Colombian kitchens.
      </p>
    </div>

    <!-- ORDER FORM -->
    <div class="card">
      <h2 data-i18n="order_form_title">Place an Order</h2>

      <form id="orderForm">
        <input type="text" placeholder="Full Name" required />
        <input type="email" placeholder="Email" required />

        <select required>
          <option value="">Select Product</option>
          <option>Picao Classic</option>
          <option>Picao Spicy</option>
          <option>Picao Premium</option>
        </select>

        <input type="number" placeholder="Quantity" min="1" required />

        <button type="submit" class="btn-primary" data-i18n="order_submit">
          Submit Order
        </button>
      </form>
    </div>

  </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p data-i18n="footer">© 2025 Picao Caldense</p>
</footer>

<!-- SIMPLE LANGUAGE HOOK (or use your global lang.js) -->
<script src="assets/js/lang.js"></script>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();
  alert("Order submitted successfully!");
  this.reset();
});
</script>

</body>
</html>
