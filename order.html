<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order | Picao Caldense</title>

<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
header { padding: 15px; background: #111; color: white; }
nav a { color: white; margin-right: 15px; text-decoration: none; }
.container { max-width: 900px; margin: auto; }
button { margin-top: 15px; padding: 10px; }
.lang button { margin-left: 5px; }
</style>
</head>

<body>

<header>
  <nav>
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="about.html" data-i18n="nav_about">About</a>
    <a href="order.html" data-i18n="nav_order">Order</a>
    <a href="contact.html" data-i18n="nav_contact">Contact</a>
  </nav>

  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('es')">ES</button>
  </div>
</header>

<div class="container">

<h1 data-i18n="order_heading">Order</h1>
<p data-i18n="order_intro"></p>

<h3 data-i18n="order_flavours"></h3>
<p data-i18n="flavour_classic"></p>
<p data-i18n="flavour_jalapeno"></p>
<p data-i18n="flavour_thai"></p>

<h3 data-i18n="product_quantities"></h3>
<ul>
  <li data-i18n="qty_355"></li>
  <li data-i18n="qty_half_dozen"></li>
  <li data-i18n="qty_dozen"></li>
  <li data-i18n="qty_custom"></li>
</ul>

<button data-i18n="place_order"></button>

</div>

<script>
const translations = {
  en: {
    nav_home:"Home", nav_about:"About", nav_order:"Order", nav_contact:"Contact",
    order_heading:"Order",
    order_intro:"Premium Colombian sauces handcrafted for flavor.",
    order_flavours:"Flavours",
    flavour_classic:"Classic Salsa",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Thai Fusion",
    product_quantities:"Available Quantities",
    qty_355:"355 ml bottles",
    qty_half_dozen:"6 bottles",
    qty_dozen:"12 bottles",
    qty_custom:"Custom orders available",
    place_order:"Place Order"
  },

  fr: {
    nav_home:"Accueil", nav_about:"À propos", nav_order:"Commander", nav_contact:"Contact",
    order_heading:"Commande",
    order_intro:"Sauces colombiennes premium.",
    order_flavours:"Saveurs",
    flavour_classic:"Classique",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Thaï",
    product_quantities:"Quantités",
    qty_355:"355 ml",
    qty_half_dozen:"6 bouteilles",
    qty_dozen:"12 bouteilles",
    qty_custom:"Sur demande",
    place_order:"Commander"
  },

  es: {
    nav_home:"Inicio", nav_about:"Acerca de", nav_order:"Ordenar", nav_contact:"Contacto",
    order_heading:"Pedido",
    order_intro:"Salsas colombianas premium.",
    order_flavours:"Sabores",
    flavour_classic:"Clásica",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Tailandesa",
    product_quantities:"Cantidades",
    qty_355:"355 ml",
    qty_half_dozen:"6 botellas",
    qty_dozen:"12 botellas",
    qty_custom:"Personalizado",
    place_order:"Hacer pedido"
  }
};

function setLang(lang){
  const dict = translations[lang];
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = dict[el.dataset.i18n] || "";
  });

  localStorage.setItem("lang", lang);
}

setLang(localStorage.getItem("lang") || "en");
</script>

</body>
</html>
