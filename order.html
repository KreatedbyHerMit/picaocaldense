<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picao Caldense</title>

<style>
:root{
  --bg:#f7f1e8;
  --text:#1a1a1a;
  --green:#1f3b2c;
  --heat:#c2412d;
  --gold:#b08a57;
}

body{
  margin:0;
  font-family: "Georgia", serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  border-bottom:1px solid rgba(176,138,87,0.25);
}

nav a{
  margin-right:16px;
  cursor:pointer;
  font-family: Arial, sans-serif;
  font-size:14px;
}

nav a:hover{ color:var(--green); }

.lang button{
  margin-left:6px;
  background:transparent;
  border:1px solid var(--gold);
  padding:6px 10px;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:90px 20px 60px;
}

.hero h1{ font-size:44px; margin:0; }

.hero p{
  max-width:600px;
  margin:15px auto 0;
  font-family: Arial, sans-serif;
  color:#444;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.4);
  border:1px solid rgba(176,138,87,0.3);
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
}

/* BUTTON */
button.primary{
  background:var(--heat);
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

section{ display:none; }
section.active{ display:block; }

/* CHAT */
#chatbox{
  height:180px;
  overflow:auto;
  border:1px solid rgba(176,138,87,0.3);
  padding:10px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.3);
}

input{
  padding:10px;
  width:70%;
  border:1px solid rgba(176,138,87,0.4);
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px 20px;
  border-top:1px solid rgba(176,138,87,0.25);
  margin-top:40px;
  font-family: Arial, sans-serif;
  font-size:13px;
  color:#444;
}
</style>
</head>

<body>

<header>

  <nav>
    <a onclick="show('home')" data-i18n="nav_home"></a>
    <a onclick="show('about')" data-i18n="nav_about"></a>
    <a onclick="show('order')" data-i18n="nav_order"></a>
    <a onclick="show('contact')" data-i18n="nav_contact"></a>
  </nav>

  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('es')">ES</button>
  </div>

</header>

<!-- HOME -->
<section id="home" class="active">
  <div class="hero">
    <h1 data-i18n="title"></h1>
    <p data-i18n="story"></p>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="hero">
    <h1 data-i18n="about_title"></h1>
    <p data-i18n="about_text"></p>
  </div>
</section>

<!-- ORDER -->
<section id="order">
  <div class="hero">
    <h1 data-i18n="order_heading"></h1>
    <p data-i18n="order_intro"></p>
  </div>

  <div class="container">
    <div class="card">
      <p><b data-i18n="order_signature_text"></b></p>
      <p data-i18n="flavour_classic"></p>
      <p data-i18n="flavour_jalapeno"></p>
      <p data-i18n="flavour_thai"></p>

      <button class="primary" onclick="orderEmail()" data-i18n="place_order"></button>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="hero">
    <h1 data-i18n="contact_title"></h1>
  </div>

  <div class="container">
    <div class="card">

      <div id="chatbox"></div>

      <input id="msg" placeholder="Type message...">
      <button class="primary" onclick="send()">Send</button>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p data-i18n="instagram"></p>
  <p data-i18n="footer"></p>
</footer>

<script>

/* TRANSLATIONS */
const translations = {
  en:{
    nav_home:"Home",
    nav_about:"About",
    nav_order:"Order",
    nav_contact:"Contact",

    title:"Picao Caldense",
    story:"Born from Colombian kitchens where flavor becomes memory.",
    about_title:"About Us",
    about_text:"A handcrafted Colombian sauce rooted in heritage.",

    order_heading:"Order",
    order_intro:"Premium handcrafted sauces inspired by Colombia.",
    order_signature_text:"Signature Blend",
    flavour_classic:"Classic herb-forward salsa",
    flavour_jalapeno:"Jalapeño heat profile",
    flavour_thai:"Thai fusion spice",
    place_order:"Place Order",

    contact_title:"Contact",

    instagram:"Follow us @picaocaldense",
    footer:"© 2025 Picao Caldense"
  },

  fr:{
    nav_home:"Accueil",
    nav_about:"À propos",
    nav_order:"Commander",
    nav_contact:"Contact",

    title:"Picao Caldense",
    story:"Saveur colombienne artisanale.",
    about_title:"À propos",
    about_text:"Marque artisanale colombienne.",

    order_heading:"Commande",
    order_intro:"Sauces premium artisanales.",
    order_signature_text:"Mélange signature",
    flavour_classic:"Classique",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Thaï",
    place_order:"Commander",

    contact_title:"Contact",

    instagram:"Suivez-nous @picaocaldense",
    footer:"© 2025 Picao Caldense"
  },

  es:{
    nav_home:"Inicio",
    nav_about:"Acerca de",
    nav_order:"Ordenar",
    nav_contact:"Contacto",

    title:"Picao Caldense",
    story:"Sabor colombiano artesanal.",
    about_title:"Acerca de",
    about_text:"Marca artesanal colombiana.",

    order_heading:"Pedido",
    order_intro:"Salsas premium artesanales.",
    order_signature_text:"Mezcla exclusiva",
    flavour_classic:"Clásica",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Tailandesa",
    place_order:"Ordenar",

    contact_title:"Contacto",

    instagram:"Síguenos @picaocaldense",
    footer:"© 2025 Picao Caldense"
  }
};

/* LANGUAGE */
function setLang(lang){
  const d = translations[lang];
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    if(d[key]) el.textContent = d[key];
  });

  localStorage.setItem("lang", lang);
}

/* NAV */
function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ORDER EMAIL */
function orderEmail(){
  window.location.href =
    "mailto:orders@picaocaldense.com?subject=Picao Caldense Order";
}

/* BOT */
function send(){
  const input = document.getElementById("msg");
  const box = document.getElementById("chatbox");

  const text = input.value.trim();
  if(!text) return;

  box.innerHTML += `<div><b>You:</b> ${text}</div>`;

  const t = text.toLowerCase();

  let reply = "";

  if(t.includes("hello") || t.includes("hi")){
    reply = "Hello 👋 How can I help you today?";
  }
  else if(t.includes("order")){
    reply = "You can place orders in the Order section.";
  }
  else if(t.includes("deliver") || t.includes("shipping")){
    reply = "Orders are shipped within a few business days after confirmation.";
  }
  else if(t.includes("quantity")){
    reply = "You can order any quantity. Custom orders are available.";
  }
  else if(t.includes("flavour")){
    reply = "We offer Classic Herb, Jalapeño Heat, and Thai Fusion.";
  }
  else{
    reply = "Thanks for your message. We’ll get back to you shortly.";
  }

  setTimeout(()=>{
    box.innerHTML += `<div><b>Picao Bot:</b> ${reply}</div>`;
    box.scrollTop = box.scrollHeight;
  },400);

  input.value = "";
}

/* INIT */
setLang(localStorage.getItem("lang") || "en");

</script>

</body>
</html>
