<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="title">Picao Caldense</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
}

header {
  padding: 15px;
  background: #111;
  color: white;
}

nav a {
  margin-right: 15px;
  color: white;
  text-decoration: none;
}

.hero {
  padding: 60px 20px;
  text-align: center;
}

.lang-switch button {
  margin-left: 5px;
}
</style>
</head>

<body>

<!-- NAV -->
<header>
  <nav>
    <a href="#" data-i18n="nav_home">Home</a>
    <a href="#" data-i18n="nav_about">About</a>
    <a href="#" data-i18n="nav_order">Order</a>
    <a href="#" data-i18n="nav_contact">Contact</a>
  </nav>

  <div class="lang-switch">
    <button onclick="setLanguage('en')">EN</button>
    <button onclick="setLanguage('fr')">FR</button>
    <button onclick="setLanguage('es')">ES</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1 data-i18n="title">Picao Caldense</h1>
  <p data-i18n="story"></p>
</section>

<!-- CONTENT -->
<section style="padding: 20px;">
  <h2 data-i18n="home_title"></h2>
  <p data-i18n="home_text"></p>
</section>

<!-- TRANSLATIONS -->
<script>
const translations = {
  en: {
    nav_home: "Home",
    nav_about: "About",
    nav_order: "Order",
    nav_contact: "Contact",
    title: "Picao Caldense",
    story: "Born from Colombian kitchens where food is shared, remembered, and felt.",
    home_title: "Welcome",
    home_text: "Welcome to Picao Caldense"
  },

  fr: {
    nav_home: "Accueil",
    nav_about: "À propos",
    nav_order: "Commander",
    nav_contact: "Contact",
    title: "Picao Caldense",
    story: "Né des cuisines colombiennes où la nourriture est partagée.",
    home_title: "Bienvenue",
    home_text: "Bienvenue chez Picao Caldense"
  },

  es: {
    nav_home: "Inicio",
    nav_about: "Acerca de",
    nav_order: "Ordenar",
    nav_contact: "Contacto",
    title: "Picao Caldense",
    story: "Nacido de cocinas colombianas donde la comida se comparte.",
    home_title: "Bienvenido",
    home_text: "Bienvenido a Picao Caldense"
  }
};

function applyLang(lang = "en") {
  const dict = translations[lang] || translations.en;

  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = dict[key] || "";
  });

  localStorage.setItem("lang", lang);
}

document.addEventListener("DOMContentLoaded", () => {
  applyLang(localStorage.getItem("lang") || "en");
});

window.setLanguage = applyLang;
</script>

</body>
</html>
