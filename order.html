<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picao Caldense</title>

<style>
:root{
  --bg:#f7f1e8;
  --text:#1a1a1a;
  --green:#1f3b2c;
  --heat:#c2412d;
  --gold:#b08a57;
}

body{
  margin:0;
  font-family: "Georgia", serif;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  border-bottom:1px solid rgba(176,138,87,0.25);
}

nav a{
  margin-right:16px;
  cursor:pointer;
  font-family: Arial, sans-serif;
  font-size:14px;
}

nav a:hover{ color:var(--green); }

.lang button{
  margin-left:6px;
  background:transparent;
  border:1px solid var(--gold);
  padding:6px 10px;
  cursor:pointer;
}

.hero{
  text-align:center;
  padding:90px 20px 60px;
}

.hero h1{ font-size:44px; margin:0; }

.hero p{
  max-width:600px;
  margin:15px auto 0;
  font-family: Arial, sans-serif;
  color:#444;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:rgba(255,255,255,0.4);
  border:1px solid rgba(176,138,87,0.3);
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
}

button.primary{
  background:var(--heat);
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

section{ display:none; }
section.active{ display:block; }

#chatbox{
  height:180px;
  overflow:auto;
  border:1px solid rgba(176,138,87,0.3);
  padding:10px;
  margin-bottom:10px;
}

input{
  padding:10px;
  width:70%;
  border:1px solid rgba(176,138,87,0.4);
  border-radius:8px;
}
</style>
</head>

<body>

<header>

  <nav>
    <a onclick="show('home')" data-i18n="nav_home"></a>
    <a onclick="show('about')" data-i18n="nav_about"></a>
    <a onclick="show('order')" data-i18n="nav_order"></a>
    <a onclick="show('contact')" data-i18n="nav_contact"></a>
  </nav>

  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('es')">ES</button>
  </div>

</header>

<!-- HOME -->
<section id="home" class="active">
  <div class="hero">
    <h1 data-i18n="title"></h1>
    <p data-i18n="story"></p>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="hero">
    <h1 data-i18n="about_title"></h1>
    <p data-i18n="about_text"></p>
  </div>
</section>

<!-- ORDER -->
<section id="order">
  <div class="hero">
    <h1 data-i18n="order_heading"></h1>
    <p data-i18n="order_intro"></p>
  </div>

  <div class="container">
    <div class="card">
      <p><b data-i18n="order_signature_text"></b></p>
      <p data-i18n="flavour_classic"></p>
      <p data-i18n="flavour_jalapeno"></p>
      <p data-i18n="flavour_thai"></p>

      <button class="primary" onclick="orderEmail()" data-i18n="place_order"></button>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="hero">
    <h1 data-i18n="contact_title"></h1>
  </div>

  <div class="container">
    <div class="card">

      <div id="chatbox"></div>

      <input id="msg" placeholder="Type message...">
      <button class="primary" onclick="send()">Send</button>

    </div>
  </div>
</section>

<script>

/* =========================
   TRANSLATIONS
========================= */

const translations = {
  en:{
    nav_home:"Home",
    nav_about:"About",
    nav_order:"Order",
    nav_contact:"Contact",

    title:"Picao Caldense",
    story:"Born from Colombian kitchens where flavor becomes memory.",

    about_title:"About Us",
    about_text:"A handcrafted Colombian sauce rooted in heritage.",

    order_heading:"Order",
    order_intro:"Premium handcrafted sauces inspired by Colombia.",
    order_signature_text:"Signature Blend",
    flavour_classic:"Classic herb-forward salsa",
    flavour_jalapeno:"Jalapeño heat profile",
    flavour_thai:"Thai fusion spice",

    place_order:"Place Order",

    contact_title:"Contact"
  },

  fr:{
    nav_home:"Accueil",
    nav_about:"À propos",
    nav_order:"Commander",
    nav_contact:"Contact",

    title:"Picao Caldense",
    story:"Saveur colombienne artisanale.",

    about_title:"À propos",
    about_text:"Une sauce artisanale colombienne.",

    order_heading:"Commande",
    order_intro:"Sauces premium artisanales.",
    order_signature_text:"Mélange signature",
    flavour_classic:"Classique",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Thaï",

    place_order:"Commander",

    contact_title:"Contact"
  },

  es:{
    nav_home:"Inicio",
    nav_about:"Acerca de",
    nav_order:"Ordenar",
    nav_contact:"Contacto",

    title:"Picao Caldense",
    story:"Sabor colombiano artesanal.",

    about_title:"Acerca de",
    about_text:"Marca artesanal colombiana.",

    order_heading:"Pedido",
    order_intro:"Salsas premium artesanales.",
    order_signature_text:"Mezcla exclusiva",
    flavour_classic:"Clásica",
    flavour_jalapeno:"Jalapeño",
    flavour_thai:"Tailandesa",

    place_order:"Ordenar",

    contact_title:"Contacto"
  }
};

/* =========================
   LANGUAGE SYSTEM
========================= */

function setLang(lang){
  const dict = translations[lang];

  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    if(dict[key]) el.textContent = dict[key];
  });

  localStorage.setItem("lang", lang);
}

/* =========================
   NAVIGATION
========================= */

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* =========================
   ORDER EMAIL
========================= */

function orderEmail(){
  window.location.href =
    "mailto:orders@picaocaldense.com?subject=Picao Caldense Order";
}

/* =========================
   CHAT BOT (SIMPLE)
========================= */

function send(){
  const input = document.getElementById("msg");
  const box = document.getElementById("chatbox");

  if(!input.value.trim()) return;

  box.innerHTML += `<div><b>You:</b> ${input.value}</div>`;

  let reply = "We will respond shortly.";

  if(input.value.toLowerCase().includes("order")){
    reply = "Go to the Order section to place your order.";
  }

  setTimeout(()=>{
    box.innerHTML += `<div><b>Bot:</b> ${reply}</div>`;
  },400);

  input.value = "";
}

/* INIT */
setLang(localStorage.getItem("lang") || "en");

</script>

</body>
</html>
