<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="order_title">Order | Picao Caldense</title>

<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVIGATION -->
<header class="site-header">
  <nav class="nav">

    <div class="nav-left">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="order.html" data-i18n="nav_order">Order</a>
      <a href="contact.html" data-i18n="nav_contact">Contact</a>
    </div>

    <div class="lang-switch">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('fr')">FR</button>
      <button onclick="setLanguage('es')">ES</button>
    </div>

  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title" data-i18n="order_title">Order</h1>
  <p class="hero-subtitle" data-i18n="order_text">
    Place your order below
  </p>
</section>

<!-- MAIN CONTENT -->
<main class="content-section">

  <div class="two-column">

    <!-- PRODUCT INFO -->
    <div class="card">
      <h2 data-i18n="order_heading">Order</h2>

      <p data-i18n="order_intro"></p>

      <h3 data-i18n="order_signature"></h3>
      <p data-i18n="order_signature_text"></p>

      <h3 data-i18n="order_flavours"></h3>

      <p data-i18n="flavour_classic"></p>
      <p data-i18n="flavour_jalapeno"></p>
      <p data-i18n="flavour_thai"></p>

      <h3 data-i18n="product_quantities"></h3>

      <ul>
        <li data-i18n="qty_355"></li>
        <li data-i18n="qty_half_dozen"></li>
        <li data-i18n="qty_dozen"></li>
        <li data-i18n="qty_custom"></li>
      </ul>

    </div>

    <!-- ORDER / INFO -->
    <div class="card">

      <h3 data-i18n="product_profile"></h3>
      <p data-i18n="product_profile_text"></p>

      <h3 data-i18n="product_use"></h3>
      <p data-i18n="product_use_text"></p>

      <h3 data-i18n="product_storage"></h3>
      <p data-i18n="product_storage_text"></p>

      <h3 data-i18n="order_checkout"></h3>
      <p data-i18n="order_checkout_text"></p>

      <button class="btn-primary" data-i18n="place_order">
        Place Order
      </button>

    </div>

  </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p data-i18n="footer">© 2025 Picao Caldense</p>
</footer>

<!-- LANGUAGE SYSTEM -->
<script>
function applyLanguage(lang = "en") {
  const dict = translations[lang] || translations.en;

  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = dict[key] || "";
  });

  localStorage.setItem("lang", lang);
}

document.addEventListener("DOMContentLoaded", () => {
  applyLanguage(localStorage.getItem("lang") || "en");
});

window.setLanguage = applyLanguage;
</script>

</body>
</html>
