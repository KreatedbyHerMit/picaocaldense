<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picao Caldense</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  color:white;
  padding:15px 20px;
}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

nav a:hover { text-decoration:underline; }

/* LANGUAGE */
.lang {
  background:#1c1c1c;
  text-align:center;
  padding:10px;
}

.lang button {
  margin:5px;
  padding:6px 10px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}

/* LAYOUT */
.container {
  max-width:1100px;
  margin:20px auto;
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  gap:15px;
}

/* CHAT */
#chat {
  background:white;
  height:520px;
  overflow-y:auto;
  padding:10px;
  border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.msg { margin:8px 0; }
.user { text-align:right; }
.bot { color:#1a7f5a; }

.input {
  display:flex;
  margin-top:10px;
}

input {
  flex:1;
  padding:12px;
  border:none;
}

button.send {
  padding:12px;
  background:#111;
  color:white;
  border:none;
}

/* PANEL */
.panel {
  background:white;
  height:520px;
  overflow-y:auto;
  padding:10px;
  border-radius:10px;
}

.q {
  width:100%;
  margin:4px 0;
  padding:8px;
  background:#111;
  color:white;
  border:none;
  cursor:pointer;
  font-size:12px;
  text-align:left;
}
.q:hover { background:#333; }

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  color:#666;
  font-size:13px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div><b>Picao Caldense</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Order</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- LANGUAGE -->
<div class="lang">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
  <button onclick="setLang('es')">ES</button>
</div>

<!-- MAIN -->
<div class="container">

<!-- CHAT -->
<div>
  <div id="chat"></div>

  <div class="input">
    <input id="input" placeholder="Ask something..." />
    <button class="send" onclick="send()">Send</button>
  </div>
</div>

<!-- INPUTS -->
<div class="panel">

<h3>ORDER</h3>
<button class="q" onclick="ask('order_1')">How do I place an order?</button>
<button class="q" onclick="ask('order_2')">Can I order multiple items?</button>
<button class="q" onclick="ask('order_3')">Payment methods?</button>
<button class="q" onclick="ask('order_4')">Cancel order?</button>

<h3>DELIVERY</h3>
<button class="q" onclick="ask('delivery_1')">Delivery time?</button>
<button class="q" onclick="ask('delivery_2')">Shipping area?</button>
<button class="q" onclick="ask('delivery_3')">Tracking?</button>

<h3>PRODUCT</h3>
<button class="q" onclick="ask('product_1')">Flavors?</button>
<button class="q" onclick="ask('product_2')">Spicy?</button>
<button class="q" onclick="ask('product_3')">Ingredients?</button>
<button class="q" onclick="ask('product_4')">Vegan?</button>

<h3>STORAGE</h3>
<button class="q" onclick="ask('store_1')">Storage?</button>
<button class="q" onclick="ask('store_2')">Refrigeration?</button>

<h3>SUPPORT</h3>
<button class="q" onclick="ask('support_1')">Refunds?</button>
<button class="q" onclick="ask('support_2')">Damaged order?</button>
<button class="q" onclick="ask('support_3')">Contact?</button>

<h3>BRAND</h3>
<button class="q" onclick="ask('brand_1')">Story?</button>

</div>

</div>

<!-- FOOTER -->
<footer>
© 2026 Picao Caldense | Instagram @thisispicaocaldense
</footer>

<script>

/* TRANSLATIONS (STRUCTURE INCLUDED) */
let lang = "en";

const t = {
 en: { fallback:"Try another question." },
 fr: { fallback:"Essayez une autre question." },
 es: { fallback:"Intenta otra pregunta." }
};

/* RESPONSES (FULL COVERAGE) */
const r = {

order_1:"Place orders via checkout.",
order_2:"Yes, multiple items allowed.",
order_3:"We accept online payments.",
order_4:"Cancel shortly after ordering.",

delivery_1:"2–7 business days.",
delivery_2:"We ship to most regions.",
delivery_3:"Tracking provided.",

product_1:"Colombian-inspired flavors.",
product_2:"Mild to hot spice levels.",
product_3:"Natural ingredients.",
product_4:"Some vegan options available.",

store_1:"Store cool and dry.",
store_2:"Refrigerate after opening.",

support_1:"Refunds for damaged orders.",
support_2:"We replace damaged items.",
support_3:"Instagram @thisispicaocaldense",

brand_1:"Colombian heritage sauce brand."
};

function add(type,text){
const d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=9999;
}

/* CHAT SEND */
function send(){
const i=document.getElementById("input");
if(!i.value) return;
add("user",i.value);
add("bot",r[detect(i.value)] || t[lang].fallback);
i.value="";
}

/* CLICK INPUT */
function ask(k){
add("user",k);
setTimeout(()=>add("bot",r[k]),200);
}

/* SIMPLE DETECT */
function detect(m){
m=m.toLowerCase();
if(m.includes("order")) return "order_1";
if(m.includes("delivery")) return "delivery_1";
if(m.includes("track")) return "delivery_3";
if(m.includes("flavor")) return "product_1";
if(m.includes("spicy")) return "product_2";
if(m.includes("ingredient")) return "product_3";
if(m.includes("refund")) return "support_1";
if(m.includes("contact")) return "support_3";
if(m.includes("picao")) return "brand_1";
return "order_1";
}

/* LANGUAGE SWITCH */
function setLang(l){
lang=l;
chat.innerHTML="";
add("bot","Language switched.");
}

const chat=document.getElementById("chat");
add("bot","Full system loaded: theme + nav + translations + chatbot.");
</script>

</body>
</html>
