<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-i18n="contact_title">Contact | Picao Caldense</title>

<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAV -->
<header class="site-header">
  <nav class="nav">

    <div class="nav-left">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="order.html" data-i18n="nav_order">Order</a>
      <a href="contact.html" data-i18n="nav_contact">Contact</a>
    </div>

    <div class="lang-switch">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('fr')">FR</button>
      <button onclick="setLanguage('es')">ES</button>
    </div>

  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title" data-i18n="contact_title">Contact</h1>
  <p class="hero-subtitle" data-i18n="contact_text">
    Get in touch with us
  </p>
</section>

<!-- CONTENT -->
<main class="content-section">

  <div class="two-column">

    <!-- INFO CARD -->
    <div class="card">
      <h2>Information</h2>
      <p>Email: hello@picaocaldense.com</p>
      <p>Location: Montreal, QC</p>
      <p data-i18n="story"></p>
    </div>

    <!-- CHAT CARD -->
    <div class="card">
      <h2 data-i18n="title">Picao Assistant</h2>

      <div id="chatbox" class="chatbox"></div>

      <div class="chat-row">
        <input id="input" placeholder="Type message..." />
        <button id="sendBtn" data-i18n="send">Send</button>
      </div>

    </div>

  </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p data-i18n="footer">© 2025 Picao Caldense</p>
</footer>

<!-- TRANSLATION SYSTEM -->
<script>
function applyLang(lang = "en") {
  const dict = translations[lang] || translations.en;

  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = dict[key] || "";
  });

  localStorage.setItem("lang", lang);
}

document.addEventListener("DOMContentLoaded", () => {
  applyLang(localStorage.getItem("lang") || "en");
});

window.setLanguage = applyLang;
</script>

<!-- CHAT -->
<script>
const chat = document.getElementById("chatbox");
const input = document.getElementById("input");
const btn = document.getElementById("sendBtn");

function addMessage(sender, text) {
  const p = document.createElement("p");
  p.innerHTML = `<b>${sender}:</b> ${text}`;
  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  addMessage("You", message);
  input.value = "";

  const bot = document.createElement("p");
  bot.innerHTML = "<b>Bot:</b> typing...";
  chat.appendChild(bot);

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    bot.innerHTML = "<b>Bot:</b> " + (data.reply || "No response");

  } catch (err) {
    bot.innerHTML = "<b>Bot:</b> connection error";
  }

  btn.disabled = false;
}

btn.addEventListener("click", send);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
