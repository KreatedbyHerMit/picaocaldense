<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Picao Caldense</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #e63946;
    }

    #chatbox {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: #f9f9f9;
    }

    .user-msg {
      text-align: right;
      margin: 8px 0;
    }

    .bot-msg {
      text-align: left;
      margin: 8px 0;
      color: #e63946;
    }

    #input-area {
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #e63946;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    button:focus,
    a:focus {
      outline: none;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <h1>🌶️ Contact Us</h1>

  <div id="chatbox">
    <h2>Picao Assistant</h2>

    <div id="messages"></div>

    <div id="input-area">
      <input
        id="userInput"
        type="text"
        placeholder="Ask about shipping, flavours, orders..."
      />

      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("userInput");
      const messages = document.getElementById("messages");

      const msg = input.value.trim();

      if (!msg) return;

      messages.innerHTML += `
        <div class="user-msg">
          <b>You:</b> ${msg}
        </div>
      `;

      let reply =
        "I can help with flavours, orders, shipping, and quantities.";

      const text = msg.toLowerCase();

      if (text.includes("flavour") || text.includes("flavor")) {
        reply =
          "We offer Classic Pique, Jalapeño Special, and Spicy Thai Delight.";
      }

      if (text.includes("shipping")) {
        reply = "Shipping usually takes 2–5 business days.";
      }

      if (text.includes("order")) {
        reply = "You can place orders directly from our Order page.";
      }

      if (text.includes("quantity")) {
        reply = "We sell 355ml bottles individually and by the dozen.";
      }

      messages.innerHTML += `
        <div class="bot-msg">
          <b>Picao Assistant:</b> ${reply}
        </div>
      `;

      messages.scrollTop = messages.scrollHeight;

      input.value = "";
    }
  </script>

</body>
</html>
