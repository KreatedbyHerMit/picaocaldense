<!DOCTYPE html>
<html>
<head>
  <title>Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="order.html">Order</a>
  <a href="contact-us.html">Contact</a>
</nav>
</header>

<div class="container">

<h1>Chatbot Assistant</h1>

<div class="chatbox" id="chatbox"></div>

<input id="input" placeholder="Type...">
<button onclick="send()">Send</button>

</div>

<script>
function send() {
  let input = document.getElementById("input").value;
  let chat = document.getElementById("chatbox");

  let reply = "Assistant available in EN/FR/ES.";

  if (input.toLowerCase().includes("order")) {
    reply = "Go to the Order page to place an order.";
  }

  chat.innerHTML += "<p><b>You:</b> " + input + "</p>";
  chat.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
