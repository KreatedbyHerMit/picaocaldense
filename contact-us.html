<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Picao Caldense</title>

  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

  <h1>🌶️ Contact Us</h1>

  <p class="caption">
    Ask us about orders, flavours, or shipping status.
  </p>

  <div class="contact-card" style="max-width:700px;margin:auto;padding:20px;background:#fff;border-radius:12px;">
    
    <h2>Picao Assistant</h2>

    <div id="messages" style="height:300px;overflow:auto;border:1px solid #ddd;padding:10px;margin-bottom:10px;"></div>

    <input id="input" placeholder="Ask a question..." style="width:70%;padding:10px;" />
    <button onclick="sendMsg()" style="padding:10px;">Send</button>

  </div>

  <script>
    async function sendMsg() {
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');

      const msg = input.value.trim();
      if (!msg) return;

      messages.innerHTML += `<div><b>You:</b> ${msg}</div>`;
      input.value = '';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ message: msg })
        });

        const data = await res.json();
        messages.innerHTML += `<div><b>Picao:</b> ${data.reply}</div>`;
        messages.scrollTop = messages.scrollHeight;

      } catch (e) {
        messages.innerHTML += `<div><b>Picao:</b> Offline</div>`;
      }
    }
  </script>

</body>
</html>
