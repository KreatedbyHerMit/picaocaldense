<div id="chatbox">
  <h2>Picao Assistant</h2>

  <div id="messages"></div>

  <input id="input" type="text" placeholder="Ask about shipping, flavours..." />
  <button onclick="sendMsg()">Send</button>
</div>

<style>
#chatbox {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

#messages {
  height: 300px;
  overflow-y: auto;
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
}

input {
  width: 70%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #e63946;
  color: white;
  border: none;
}
</style>

<script>
function sendMsg() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  const msg = input.value.trim();
  if (!msg) return;

  messages.innerHTML += `<div><b>You:</b> ${msg}</div>`;

  let reply = "I can help with shipping, flavours, and quantities.";

  const text = msg.toLowerCase();

  if (text.includes("flavour") || text.includes("flavors")) {
    reply = "We offer: Classic Pique, Jalapeño Special, and Spicy Thai Delight.";
  }

  if (text.includes("shipping")) {
    reply = "Shipping takes 2–5 business days.";
  }

  if (text.includes("quantity")) {
    reply = "We sell 355ml bottles individually or by the dozen.";
  }

  messages.innerHTML += `<div><b>Picao Assistant:</b> ${reply}</div>`;
  messages.scrollTop = messages.scrollHeight;

  input.value = "";
}
</script>
