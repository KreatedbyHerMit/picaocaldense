<script>
async function send() {
  const inputEl = document.getElementById("input");
  const chat = document.getElementById("chatbox");

  const message = inputEl.value.trim();
  if (!message) return;

  const userMsg = document.createElement("p");
  userMsg.innerHTML = "<b>You:</b> " + message;
  chat.appendChild(userMsg);

  inputEl.value = "";

  const botMsg = document.createElement("p");
  botMsg.innerHTML = "<b>Bot:</b> typing...";
  chat.appendChild(botMsg);

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    if (!res.ok) throw new Error("Network error");

    const data = await res.json();

    botMsg.innerHTML = "<b>Bot:</b> " + data.reply;

  } catch (err) {
    console.error(err);
    botMsg.innerHTML = "<b>Bot:</b> Connection error";
  }
}
</script>
<script>
async function send() {
  const inputEl = document.getElementById("input");
  const chat = document.getElementById("chatbox");

  const message = inputEl.value.trim();
  if (!message) return;

  chat.innerHTML += `<p><b>You:</b> ${message}</p>`;
  inputEl.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    chat.innerHTML += `<p><b>Bot:</b> ${data.reply}</p>`;
  } catch (err) {
    console.error(err);
    chat.innerHTML += `<p><b>Bot:</b> error</p>`;
  }
}
</script>
