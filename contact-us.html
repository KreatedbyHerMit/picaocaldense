<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Salsa Picao Caldense</title>

<link rel="stylesheet" href="styles.css">

<style>
#chat-wrapper {
  max-width: 700px;
  margin: 60px auto;
}

#chat-box {
  background: white;
  border: 1px solid #ddd;
  border-radius: 14px;
  padding: 20px;
  height: 400px;
  overflow-y: auto;
}

#chat-controls {
  display: flex;
  margin-top: 15px;
}

#userInput {
  flex: 1;
  padding: 14px;
  border: 1px solid #ccc;
  border-radius: 10px;
}

#send-btn {
  margin-left: 10px;
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  background: #b22222;
  color: white;
  cursor: pointer;
}

.user-msg {
  margin: 10px 0;
  text-align: right;
}

.bot-msg {
  margin: 10px 0;
  color: #b22222;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="order.html">Order</a>
  <a href="contact-us.html">Contact</a>
</nav>

<div class="container">

<h1>Contact Us</h1>

<div id="chat-wrapper">

<div id="chat-box">
  <div class="bot-msg">
    <strong>Picao Assistant:</strong>
    Welcome to Salsa Picao Caldense 🌶️
  </div>
</div>

<div id="chat-controls">
  <input id="userInput" placeholder="Ask about shipping, flavours, or quantities..." />
  <button id="send-btn">Send</button>
</div>

</div>

</div>

<script src="assets/chatbot.js"></script>

</body>
</html>
