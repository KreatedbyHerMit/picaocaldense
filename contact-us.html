<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
</head>
<body>

  <h1>Contact Us</h1>

  <div id="picao-chat">
    <h3>🌶️ Picao Assistant</h3>

    <div id="messages"></div>

    <input id="input" placeholder="Ask a question..." />
    <button onclick="sendMsg()">Send</button>
  </div>

  <script>
    function sendMsg() {
      const input = document.getElementById("input");
      const msg = input.value.trim();
      const box = document.getElementById("messages");

      if (!msg) return;

      box.innerHTML += "<div><b>You:</b> " + msg + "</div>";

      let reply = "Thanks! We will follow up with you shortly.";

      if (msg.includes("price")) reply = "We sell 355ml bottles in packs.";
      if (msg.includes("flavor")) reply = "We have Classic Pique, Jalapeño Special, Spicy Thai Delight.";

      box.innerHTML += "<div><b>Picao Assistant:</b> " + reply + "</div>";

      input.value = "";
    }
  </script>

</body>
</html>
