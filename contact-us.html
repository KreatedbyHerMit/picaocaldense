<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="assets/css/styles.css">
  <title>Contact</title>
</head>

<body>

<header>
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="order.html">Order</a>
  <a href="contact-us.html">Contact</a>
</nav>
</header>

<div class="container">

<h1>Chatbot Assistant</h1>

<div class="chatbox" id="chatbox"></div>

<input id="input" placeholder="Type...">
<button onclick="send()">Send</button>

</div>

<script>
async function send() {
  const inputEl = document.getElementById("input");
  const chat = document.getElementById("chatbox");

  const message = inputEl.value.trim();
  if (!message) return;

  // Show user message safely
  const userMsg = document.createElement("p");
  userMsg.innerHTML = "<b>You:</b> " + message;
  chat.appendChild(userMsg);

  inputEl.value = "";

  // Loading state
  const loadingMsg = document.createElement("p");
  loadingMsg.innerHTML = "<b>Bot:</b> typing...";
  chat.appendChild(loadingMsg);

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    loadingMsg.innerHTML = "<b>Bot:</b> " + (data.reply || "No response");
  } catch (err) {
    loadingMsg.innerHTML = "<b>Bot:</b> Sorry, connection error.";
  }
}
</script>

</body>
</html>
