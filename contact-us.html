<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Picao Caldense</title>

<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
header { padding: 15px; background: #111; color: white; }
nav a { color: white; margin-right: 15px; text-decoration: none; }

#chatbox {
  border: 1px solid #ccc;
  height: 250px;
  overflow-y: auto;
  padding: 10px;
  margin-bottom: 10px;
}

input { width: 70%; padding: 8px; }
button { padding: 8px; }
.lang button { margin-left: 5px; }
</style>
</head>

<body>

<header>
  <nav>
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="about.html" data-i18n="nav_about">About</a>
    <a href="order.html" data-i18n="nav_order">Order</a>
    <a href="contact.html" data-i18n="nav_contact">Contact</a>
  </nav>

  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('es')">ES</button>
  </div>
</header>

<h1 data-i18n="contact_title">Contact</h1>

<div id="chatbox"></div>

<input id="msg" placeholder="Type message..." />
<button onclick="send()">Send</button>

<script>
const translations = {
  en: { nav_home:"Home", nav_about:"About", nav_order:"Order", nav_contact:"Contact", contact_title:"Contact" },
  fr: { nav_home:"Accueil", nav_about:"À propos", nav_order:"Commander", nav_contact:"Contact", contact_title:"Contact" },
  es: { nav_home:"Inicio", nav_about:"Acerca de", nav_order:"Ordenar", nav_contact:"Contacto", contact_title:"Contacto" }
};

function setLang(lang){
  const dict = translations[lang];
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = dict[el.dataset.i18n] || "";
  });

  localStorage.setItem("lang", lang);
}

function send(){
  const input = document.getElementById("msg");
  const box = document.getElementById("chatbox");

  if(!input.value.trim()) return;

  box.innerHTML += "<div><b>You:</b> " + input.value + "</div>";
  input.value = "";
  box.scrollTop = box.scrollHeight;
}

setLang(localStorage.getItem("lang") || "en");
</script>

</body>
</html>
