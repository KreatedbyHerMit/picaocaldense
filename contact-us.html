<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
</head>

<body>

  <h1>Contact Us</h1>

  <p>Picao Caldense Support</p>

<div id="chatbox" style="border:2px solid #333; padding:10px; width:300px; background:#fff; position:fixed; bottom:20px; right:20px; z-index:9999;">
  <div id="messages" style="height:200px; overflow-y:auto; border:1px solid #ddd; margin-bottom:10px; padding:5px;"></div>
  <input id="userInput" type="text" placeholder="Type message..." style="width:70%;">
  <button onclick="sendMessage()">Send</button>
</div>
    <h3>🌶️ Picao Assistant</h3>

    <div id="messages"></div>

    <input id="input" placeholder="Ask about orders..." />
    <button onclick="sendMsg()">Send</button>
  </div>

  <script>
    function sendMsg() {
      const input = document.getElementById("input");
      const msg = input.value.trim();
      const box = document.getElementById("messages");

      if (!msg) return;

      box.innerHTML += "<div><b>You:</b> " + msg + "</div>";

      let reply = "Thanks! We will contact you shortly.";

      if (msg.includes("price")) reply = "We sell 355ml bottles in half-dozen and dozen packs.";
      if (msg.includes("flavor")) reply = "Flavors: Classic Pique, Jalapeño Special, Spicy Thai Delight.";

      box.innerHTML += "<div><b>Picao Assistant:</b> " + reply + "</div>";

      input.value = "";
    }
  </script>

</body>
</html>

<script>
function sendMessage() {
  const input = document.getElementById("userInput");
  const messages = document.getElementById("messages");

  if (!input.value) return;

  const userMsg = document.createElement("div");
  userMsg.innerText = "You: " + input.value;
  messages.appendChild(userMsg);

  const botMsg = document.createElement("div");
  botMsg.innerText = "Support: Thanks! We'll respond shortly.";
  messages.appendChild(botMsg);

  input.value = "";
}
</script>
