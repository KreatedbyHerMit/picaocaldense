<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Contact</title>

  <link rel="stylesheet" href="styles.css">
  <script src="lang.js"></script>

  <style>
    #chatbox {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 20px;
      background: #fff;
      border-radius: 8px;
    }

    .chat-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .chat-row input {
      flex: 1;
      padding: 10px;
    }

    .chat-row button {
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header class="site-header">
  <nav class="nav">

    <div class="nav-left">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="order.html" data-i18n="nav_order">Order</a>
      <a href="contact-us.html" data-i18n="nav_contact">Contact</a>
    </div>

    <div class="lang-switch">
    </div>

  </nav>
</header>

<main class="container">

  <h1>Chatbot Assistant</h1>

  <div id="chatbox"></div>

  <div class="chat-row">
    <input id="input" placeholder="Type message..." />
    <button id="sendBtn">Send</button>
  </div>

</main>

<footer class="site-footer">
  <p data-i18n="footer">© 2025 Picao Caldense</p>
</footer>

<script>
const chat = document.getElementById("chatbox");
const input = document.getElementById("input");
const btn = document.getElementById("sendBtn");

function addMessage(sender, text) {
  const p = document.createElement("p");

  const bold = document.createElement("b");
  bold.textContent = sender + ": ";

  p.appendChild(bold);
  p.appendChild(document.createTextNode(text));

  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  addMessage("You", message);
  input.value = "";

  const bot = document.createElement("p");
  bot.innerHTML = "<b>Bot:</b> typing...";
  chat.appendChild(bot);

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    bot.innerHTML = "<b>Bot:</b> ";
    bot.appendChild(document.createTextNode(data.reply || "No response"));

  } catch (err) {
    bot.innerHTML = "<b>Bot:</b> connection error";
  }

  btn.disabled = false;
}

btn.addEventListener("click", send);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
