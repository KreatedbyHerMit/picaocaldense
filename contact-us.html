<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #fafafa;
    }

    nav {
      margin-bottom: 20px;
    }

    nav a {
      margin-right: 15px;
      text-decoration: none;
      color: black;
    }

    #chatbox {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #e63946;
      color: white;
      border: none;
    }
  </style>
<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="order.html">Order</a>
</nav>

<h1>Contact Us</h1>

<div id="chatbox">
  <div id="messages"></div>

  <input id="input" placeholder="Ask something..." />
  <button onclick="sendMsg()">Send</button>
</div>

<script>
function sendMsg() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  const msg = input.value.trim();
  if (!msg) return;

  messages.innerHTML += `<div><b>You:</b> ${msg}</div>`;

  let reply = "I can help with orders, shipping, and flavours.";

  if (msg.toLowerCase().includes("shipping")) reply = "Shipping is 2–5 days.";
  if (msg.toLowerCase().includes("order")) reply = "Go to the Order page.";
  if (msg.toLowerCase().includes("flavour")) reply = "We offer 3 signature sauces.";

  messages.innerHTML += `<div><b>Bot:</b> ${reply}</div>`;
  input.value = "";
}
</script>

</body>
</html>
